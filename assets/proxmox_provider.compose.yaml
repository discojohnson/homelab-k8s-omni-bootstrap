services:
  omni-infra-provider-proxmox:
    image: ghcr.io/siderolabs/omni-infra-provider-proxmox
    container_name: omni-infra-provider-proxmox
    env_file:
      - ${OMNI_ASSETS}/proxmox_provider.env.decrypted
    volumes:
      - ${OMNI_ASSETS}/proxmox_provider.config.yaml.decrypted:/config.yaml
    command: >
      --config-file /config.yaml
      --omni-api-endpoint ${OMNI_ENDPOINT}
      --omni-service-account-key ${OMNI_SERVICE_ACCOUNT_KEY}
    restart: unless-stopped
    network_mode: host
 
